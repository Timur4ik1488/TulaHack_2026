  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tule_backend
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      # Код в контейнере: /app/app/... — статика монтируется туда же, иначе загрузки не попадают на хост.
      - ./backend/app/static:/app/app/static
      - ./backend/app/media:/app/media
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    ports:
      - 8000:8000
    networks:
      - dev

  # Telegram-бот: polling + вызовы internal API бэкенда.
  # Обязательно в корневом .env: TELEGRAM_BOT_TOKEN (или BOT_TOKEN), TELEGRAM_INTERNAL_SECRET — тот же секрет, что у backend.
  # API_BASE_URL — имя сервиса Docker Compose (ниже сервис backend), не 127.0.0.1.
  tg_bot:
    build:
      context: ./tg_bot
      dockerfile: Dockerfile
    container_name: tula_tg_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Переопределяет только URL API; токены и секрет — из .env (см. .env.example).
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dev

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: tula_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - dev
    depends_on:
      backend:
        condition: service_healthy

  loki:
    image: grafana/loki:2.9.8
    container_name: tula_loki
    restart: unless-stopped
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dev

  promtail:
    image: grafana/promtail:2.9.8
    container_name: tula_promtail
    restart: unless-stopped
    volumes:
      - ./infra/observability/promtail.yml:/etc/promtail/config.yml:ro
      - ./frontend/nginx/logs:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dev
    depends_on:
      - loki
      - nginx

  grafana:
    image: grafana/grafana:11.1.0
    container_name: tula_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/ops/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    networks:
      - dev
    depends_on:
      - prometheus
      - loki

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nginx_hack_2026
    restart: unless-stopped
    volumes:
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/app/media:/app/media:ro
      - ./frontend/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      grafana:
        condition: service_started
    networks:
      - dev

volumes:
  loki_data:
  grafana_data:
