# =============================================================================
# DEPLOY (прод): раскомментируйте нужное; для локальной разработки всё ниже
# остаётся выключенным. Часто используют: отдельный compose.override.yml
# (`docker compose -f compose.yml -f compose.prod.yml up -d`).
#
#   # Пример ограничений ресурсов backend:
#   # deploy:
#   #   resources:
#   #     limits: { cpus: "1.0", memory: 512M }
#   #     reservations: { cpus: "0.25", memory: 256M }
#
#   # Логи в JSON для Loki/Datadog (драйвер на хосте должен быть настроен):
#   # logging:
#   #   driver: json-file
#   #   options: { max-size: "10m", max-file: "3" }
#
#   # Только внутренняя сеть без публикации порта Postgres наружу:
#   # ports: []  # у сервиса db — не маппить 5432 на хост
#
#   # Прод-оверлей HTTPS: вынести nginx за reverse-proxy (Traefik/Caddy) или
#   # см. закомментированный server { listen 443 ssl } в frontend/nginx/default.conf
#
#   # BOOTSTRAP_ADMIN=false в .env на проде после создания админа.
#
# --- Ваш прод-хост (только подсказка в комментариях; значения задаёте в .env) ---
# PostgreSQL на сервере 150.241.103.30, порт 5435 (не меняйте compose, пока локально):
#   POSTGRES_HOST=150.241.103.30
#   POSTGRES_PORT=5435
#   POSTGRES_USER=...
#   POSTGRES_PASSWORD=...   # не коммитить
#   POSTGRES_DB=...
# Публичный URL фронта для бота и CORS (пример):
#   PUBLIC_SITE_URL=http://150.241.103.30
# CORS: добавить в CORS_ORIGINS тот же origin (см. backend app/core/config.py — комментарии DEPLOY).
# Если понадобится: SSL-сертификаты, firewall (5435 только для IP бэкенда), отдельный домен — допишите сюда.
# =============================================================================

networks:
  dev:
    driver: bridge

services:
  # db:
  #   image: postgres:alpine
  #   container_name: tula_db
  #   shm_size: 256mb
  #   restart: unless-stopped
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  #   env_file:
  #     - .env

  #   environment:
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB}

  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
  #     interval: 8s
  #     timeout: 30s
  #     retries: 5

  #   ports:
  #     - 5434:5432

  #   networks:
  #     - dev

  # adminer:
  #   image: adminer
  #   container_name: tula_adminer
  #   restart: always
  #   ports:
  #     - 7000:8080
  #   networks:
  #     - dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tule_backend
    restart: unless-stopped
    # DEPLOY: сменить образ на фиксированный тег / digest после CI.
    # image: registry.example.com/tulahack-backend:${GIT_SHA:-latest}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # DEPLOY: без --reload; при желании workers (нужен gunicorn+uvicorn.worker):
    # command: sh -c "alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000"
    volumes:
      # Код в контейнере: /app/app/... — статика монтируется туда же, иначе загрузки не попадают на хост.
      - ./backend/app/static:/app/app/static
      - ./backend/app/media:/app/media
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    # DEPLOY: строка выше не меняется; в корневом .env задать POSTGRES_HOST=150.241.103.30 POSTGRES_PORT=5435 и учётку БД.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    ports:
      - 8000:8000
    # DEPLOY: не публиковать 8000 наружу — только nginx → backend по сети:
    # ports: []
    networks:
      - dev

  # Telegram-бот: polling + вызовы internal API бэкенда.
  # Обязательно в корневом .env: TELEGRAM_BOT_TOKEN (или BOT_TOKEN), TELEGRAM_INTERNAL_SECRET — тот же секрет, что у backend.
  # API_BASE_URL — имя сервиса Docker Compose (ниже сервис backend), не 127.0.0.1.
  tg_bot:
    build:
      context: ./tg_bot
      dockerfile: Dockerfile
    container_name: tula_tg_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Переопределяет только URL API; токены и секрет — из .env (см. .env.example).
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dev

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: tula_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - dev
    depends_on:
      backend:
        condition: service_healthy

  loki:
    image: grafana/loki:2.9.8
    container_name: tula_loki
    restart: unless-stopped
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dev

  promtail:
    image: grafana/promtail:2.9.8
    container_name: tula_promtail
    restart: unless-stopped
    volumes:
      - ./infra/observability/promtail.yml:/etc/promtail/config.yml:ro
      - ./frontend/nginx/logs:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dev
    depends_on:
      - loki
      - nginx

  grafana:
    image: grafana/grafana:11.1.0
    container_name: tula_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/ops/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    networks:
      - dev
    depends_on:
      - prometheus
      - loki

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # DEPLOY: пин образа фронта из registry.
    # image: registry.example.com/tulahack-frontend:${GIT_SHA:-latest}
    container_name: nginx_hack_2026
    restart: unless-stopped
    volumes:
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/app/media:/app/media:ro
      - ./frontend/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
    # DEPLOY: HTTPS на хосте — проброс 443 и volume с сертификатами; см. default.conf
    # ports:
    #   - "80:80"
    #   - "443:443"
    # volumes:
    #   - ./infra/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
    #   - ./infra/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      backend:
        condition: service_healthy
      grafana:
        condition: service_started
    networks:
      - dev

# DEPLOY: секреты не хранить в git — использовать Docker secrets / external vault.
# DEPLOY: для одного хоста — `docker compose pull && docker compose up -d --remove-orphans`.
# DEPLOY: мониторинг наружу не открывать — убрать ports у prometheus/grafana или firewall.

volumes:
  loki_data:
  grafana_data:
