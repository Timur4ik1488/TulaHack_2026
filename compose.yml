networks:
  dev:
    driver: bridge

services:
  db:
    image: postgres:alpine
    container_name: tule_db
    shm_size: 256mb
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

    env_file:
      - .env

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # - POSTGRES_HOST=${POSTGRES_HOST}
      # - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      # - DATABASE_URL=postgresql+asyncpg://{POSTGRES_USER}:{POSTGRES_PASSWORD}@{POSTGRES_HOST}:{POSTGRES_PORT}/{POSTGRES_DB}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tula_user -d tula_db"]
      interval: 8s
      timeout: 30s
      retries: 5

    ports:
      - 5434:5432 #порты 5432 и 5433 у меня уже заняты

    networks:
      - dev

  adminer:
    image: adminer
    container_name: tula_adminer
    restart: always
    ports:
      - 7000:8080
    networks:
      - dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tule_backend
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend/app/static:/app/static
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8000:8000
    networks:
      - dev


volumes:
  postgres_data: