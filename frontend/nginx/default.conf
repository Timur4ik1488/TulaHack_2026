# =============================================================================
# HackSwipe — nginx (Docker). Локально: server_name _ и listen 80 — не трогать.
#
# --- DEPLOY: публичный домен hackswipe-tula.ru и www.hackswipe-tula.ru (только планы в комментариях) ---
# DNS: A/AAAA для hackswipe-tula.ru и www.hackswipe-tula.ru → IP сервера (напр. 150.241.103.30).
# TLS: выпустить сертификат (Let's Encrypt certbot или провайдер), пути к pem — в примерах ниже.
#
# Рабочий server {} ниже оставить для compose; на проде обычно добавляют второй файл или заменяют блок:
#   server_name hackswipe-tula.ru www.hackswipe-tula.ru;
#   listen 443 ssl http2;
#   ssl_certificate     /etc/nginx/ssl/hackswipe-tula.ru.fullchain.pem;
#   ssl_certificate_key /etc/nginx/ssl/hackswipe-tula.ru.privkey.pem;
#
# Канонический хост (выберите один вариант при раскомментировании):
#   A) Только https://hackswipe-tula.ru — отдельный server listen 80 + 301 на https://hackswipe-tula.ru$request_uri;
#      и для www: return 301 https://hackswipe-tula.ru$request_uri;
#   B) Или наоборот везде www — тогда 301 с apex на www.
#
# Заголовки (внутри server 443 после отладки):
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#   add_header X-Content-Type-Options nosniff always;
#   add_header X-Frame-Options SAMEORIGIN always;
#   add_header Referrer-Policy strict-origin-when-cross-origin always;
#
# Grafana (compose): в .env задать GF_SERVER_ROOT_URL=https://hackswipe-tula.ru/ops/grafana/
#
# Backend / фронт (.env): PUBLIC_SITE_URL=https://hackswipe-tula.ru (или с www — одна каноническая схема);
# CORS и cookie Secure/SameSite — в настройках приложения, не в nginx (см. backend app config / .env.example).
#
# Лимиты (осторожно с WebSocket /socket.io/):
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
#   limit_req zone=api_limit burst=20 nodelay;  # внутри location /api/
#
# Backend вне Docker на том же хосте: upstream backend_upstream { server 127.0.0.1:8000; }
# =============================================================================

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream grafana_upstream {
    server grafana:3000;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    # DEPLOY (hackswipe-tula.ru): заменить на, например:
    #   server_name hackswipe-tula.ru www.hackswipe-tula.ru;
    # и добавить отдельный server для 443 + редирект с :80 (см. закомментированный шаблон в конце файла).

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    # Загрузки бэкенда (compose: ./backend/app/media -> /app/media)
    location ^~ /media/ {
        alias /app/media/;
        autoindex off;
        limit_except GET HEAD { deny all; }
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri $uri/ =404;
    }

    # Статика FastAPI (/static)
    location ^~ /static/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }

    # Socket.IO (тот же ASGI, что и API)
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # FastAPI: все пути с префиксом /api/ уходят на бэкенд как есть (без rewrite)
    # Grafana за тем же хостом (см. compose: GF_SERVER_ROOT_URL …/ops/grafana/)
    location ^~ /ops/grafana/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_redirect off;
        proxy_buffering off;
        proxy_pass http://grafana_upstream;
    }

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 300;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /about {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# =============================================================================
# Ниже — целиком закомментированный черновик под прод-домен. Не раскомментировать блоками в середине
# файла без проверки: nginx не допускает «дырявых» server {}. Копировать в отдельный .conf или заменить
# активный server выше, когда DNS и сертификаты готовы.
#
# # --- HTTP → HTTPS (оба имени) ---
# # server {
# #     listen 80;
# #     server_name hackswipe-tula.ru www.hackswipe-tula.ru;
# #     return 301 https://hackswipe-tula.ru$request_uri;
# # }
#
# # --- HTTPS, основной сайт (пример: канон без www) ---
# # server {
# #     listen 443 ssl http2;
# #     server_name hackswipe-tula.ru www.hackswipe-tula.ru;
# #     ssl_certificate     /etc/nginx/ssl/hackswipe-tula.ru.fullchain.pem;
# #     ssl_certificate_key /etc/nginx/ssl/hackswipe-tula.ru.privkey.pem;
# #
# #     root /usr/share/nginx/html;
# #     index index.html;
# #     client_max_body_size 20m;
# #
# #     if ($host = www.hackswipe-tula.ru) {
# #         return 301 https://hackswipe-tula.ru$request_uri;
# #     }
# #
# #     # Дальше скопировать location из рабочего server {} выше: /media/, /static/, /socket.io/,
# #     # /ops/grafana/, /api/, /assets/, location /
# # }
#
# Подсказка: для certbot часто используют include snippets/ssl-params.conf; согласуйте с путём к ключам.
# =============================================================================
